<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Gemini Privado</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #131314; color: #e3e3e3; height: 100vh; display: flex; }
        
        /* Layout dividido */
        .chat-section { width: 50%; height: 100%; display: flex; flex-direction: column; border-right: 1px solid #444; }
        .pdf-section { width: 50%; height: 100%; background-color: #1e1e1f; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* Histórico do Chat */
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .mensagem { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
        .user { background-color: #2b2a2a; align-self: flex-end; color: #fff; }
        .gemini { background-color: #1e1e1f; align-self: flex-start; border: 1px solid #333; }
        
        /* Barra de Entrada */
        .input-container { padding: 20px; background-color: #131314; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 14px; background: #202124; border: 1px solid #5f6368; border-radius: 24px; color: white; font-size: 15px; outline: none; }
        input[type="text"]:focus { border-color: #8ab4f8; }
        button { background: #8ab4f8; color: #131314; border: none; padding: 0 24px; border-radius: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #aecbfa; }

        /* Preview PDF */
        iframe { width: 100%; height: 100%; border: none; display: none; }
        .placeholder-pdf { color: #80868b; text-align: center; font-size: 16px; }
    </style>
</head>
<body>

    <div class="chat-section">
        <div class="chat-history" id="chatHistory">
            <div class="mensagem gemini">Olá! Sou o seu assistente conectado ao Google Drive. Pergunte-me qualquer dado sobre as apólices dos clientes.</div>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Ex: Procure o valor total do seguro do cliente Carlos..." onkeypress="if(event.key === 'Enter') enviarMensagem()">
            <button onclick="enviarMensagem()">Perguntar</button>
        </div>
    </div>

    <div class="pdf-section">
        <div class="placeholder-pdf" id="pdfPlaceholder">O documento correspondente aparecerá aqui automaticamente.</div>
        <iframe id="pdfViewer"></iframe>
    </div>

<script>
async function enviarMensagem() {
    const input = document.getElementById('userInput');
    const texto = input.value.trim();
    if (!texto) return;

    input.value = '';
    const history = document.getElementById('chatHistory');

    // 1. Adicionar mensagem do usuário no chat
    history.innerHTML += `<div class="mensagem user">${texto}</div>`;
    history.scrollTop = history.scrollHeight;

    // 2. Criar balão de carregamento do Gemini
    const geminiId = 'gemini-' + Date.now();
    history.innerHTML += `<div class="mensagem gemini" id="${geminiId}">A pesquisar na pasta do Google Drive...</div>`;
    history.scrollTop = history.scrollHeight;

    try {
        // Enviar para a função segura no Netlify
        const response = await fetch('/.netlify/functions/gemini-workspace', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pergunta: texto })
        });

        const dados = await response.json();
        
        // Atualizar resposta no chat
        document.getElementById(geminiId).innerHTML = `<strong>Gemini:</strong> ${dados.resultado}`;

        // Se encontrou o PDF e a página, carrega no visualizador do lado direito
        if (dados.pdfUrl && dados.pagina) {
            const iframe = document.getElementById('pdfViewer');
            const placeholder = document.getElementById('pdfPlaceholder');
            
            placeholder.style.display = 'none';
            // Monta a URL direta de visualização do Google Drive saltando para a página correta
            iframe.src = `${dados.pdfUrl}#page=${dados.pagina}`;
            iframe.style.display = 'block';
        }
    } catch (erro) {
        document.getElementById(geminiId).innerText = "Houve um erro ao processar a pesquisa no Drive.";
    }
}
</script>
</body>
</html>
