<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Gemini Privado</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #131314; color: #e3e3e3; height: 100vh; display: flex; overflow: hidden; }
        
        /* Layout dividido 50/50 */
        .chat-section { width: 50%; height: 100%; display: flex; flex-direction: column; border-right: 1px solid #2f2f30; }
        .pdf-section { width: 50%; height: 100%; background-color: #1e1e1f; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* Histórico do Chat */
        .chat-history { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .mensagem { padding: 14px 18px; border-radius: 18px; max-width: 85%; line-height: 1.6; font-size: 15px; word-wrap: break-word; }
        .user { background-color: #2b2a2a; align-self: flex-end; color: #fff; border-bottom-right-radius: 4px; }
        .gemini { background-color: #1e1e1f; align-self: flex-start; border: 1px solid #333; border-bottom-left-radius: 4px; }
        
        /* Barra de Entrada de Texto inferior */
        .input-container { padding: 20px; background-color: #131314; display: flex; gap: 12px; border-top: 1px solid #2f2f30; }
        input[type="text"] { flex: 1; padding: 14px 20px; background: #202124; border: 1px solid #5f6368; border-radius: 28px; color: white; font-size: 15px; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #8ab4f8; }
        button { background: #8ab4f8; color: #131314; border: none; padding: 0 28px; border-radius: 28px; font-weight: bold; font-size: 15px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #aecbfa; }

        /* Preview Lateral do PDF */
        iframe { width: 100%; height: 100%; border: none; display: none; background: white; }
        .placeholder-pdf { color: #80868b; text-align: center; font-size: 16px; padding: 40px; line-height: 1.4; }

        /* Animaçãozinha de Digitação (Três pontinhos) */
        .typing-dots span { display: inline-block; width: 6px; height: 6px; background: #8ab4f8; border-radius: 50%; margin-right: 3px; animation: blink 1.4s infinite both; }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    </style>
</head>
<body>

    <div class="chat-section">
        <div class="chat-history" id="chatHistory">
            <div class="mensagem gemini">Olá! Sou o seu assistente conectado ao Google Drive. Pergunte-me qualquer dado ou peça valores sobre as apólices dos clientes.</div>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Ex: Qual o valor do seguro do Carlos e em que página está?" onkeypress="if(event.key === 'Enter') enviarMensagem()">
            <button onclick="enviarMensagem()">Enviar</button>
        </div>
    </div>

    <div class="pdf-section">
        <div class="placeholder-pdf" id="pdfPlaceholder">Quando você fizer uma pergunta sobre um cliente, o documento correspondente abrirá aqui na página exata automaticamente.</div>
        <iframe id="pdfViewer"></iframe>
    </div>

<script>
async function enviarMensagem() {
    const input = document.getElementById('userInput');
    const texto = input.value.trim();
    if (!texto) return;

    // Limpa o campo de entrada imediatamente
    input.value = '';
    const history = document.getElementById('chatHistory');

    // 1. Renderiza a mensagem do usuário na tela
    history.innerHTML += `<div class="mensagem user">${texto}</div>`;
    history.scrollTop = history.scrollHeight;

    // 2. Cria o balão de carregamento simulando o Gemini pensando
    const geminiId = 'gemini-' + Date.now();
    history.innerHTML += `
        <div class="mensagem gemini" id="${geminiId}">
            <div class="typing-dots">Analisando o Google Drive <span></span><span></span><span></span></div>
        </div>
    `;
    history.scrollTop = history.scrollHeight;

    try {
        // 3. Dispara a rota correta para o servidor Express do Render
        const response = await fetch('/api/gemini-workspace', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pergunta: texto })
        });

        const dados = await response.json();
        
        // 4. Atualiza o balão do chat com a resposta em formato texto
        document.getElementById(geminiId).innerHTML = `<strong>Gemini:</strong> ${dados.resultado}`;

        // 5. Se o servidor retornou o link do PDF do Drive e o número da página, atualiza o frame lateral
        if (dados.pdfUrl && dados.pagina) {
            const iframe = document.getElementById('pdfViewer');
            const placeholder = document.getElementById('pdfPlaceholder');
            
            placeholder.style.display = 'none';
            // Alimenta a URL do frame injetando a hash #page=X nativa dos navegadores
            iframe.src = `${dados.pdfUrl}#page=${dados.pagina}`;
            iframe.style.display = 'block';
        }
    } catch (erro) {
        document.getElementById(geminiId).innerHTML = `<strong>Erro:</strong> Não foi possível processar a requisição no servidor.`;
    }
    
    // Força a rolagem do chat para a última resposta
    history.scrollTop = history.scrollHeight;
}
</script>
</body>
</html>
